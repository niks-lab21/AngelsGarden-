<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>The Angel's Garden</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <video autoplay muted loop id="main-video-bg">
        <source src="assets/videos/main_sanctuary.mp4" type="video/mp4">
    </video>

    <div id="media-dock" class="hidden-dock">
        <div class="swipe-handle"></div>
        <div class="controls">
            <div id="track-info">Nature: Rainy Night</div>
            <button onclick="toggleAudio()">Play/Pause</button>
            <div id="spotify-player">
                </div>
        </div>
    </div>

    <canvas id="doodle-canvas"></canvas>

    <div id="interaction-layer">
        <div id="cat-trigger" onclick="playHapticPurr()"></div>
        <div id="envelope-trigger" onclick="openHiddenNote()"></div>
    </div>

    <script src="script.js"></script>
</body>
</html>
