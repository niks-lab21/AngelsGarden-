name: Build Android APK
on:
  push:
    branches: [ main ]
  workflow_dispatch:
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-node@v3
        with:
          node-version: '18'
      - run: npm install
      - run: |
          cat > android/capacitor.settings.gradle << 'EOF'
          def capacitorExtrasPath = "../node_modules/@capacitor/android/capacitor"
          include ':capacitor-android'
          project(':capacitor-android').projectDir = new File(capacitorExtrasPath)
          EOF
      - run: |
          cat > android/app/capacitor.build.gradle << 'EOF'
          android {
            compileOptions {
              sourceCompatibility JavaVersion.VERSION_21
              targetCompatibility JavaVersion.VERSION_21
            }
          }
          EOF
      - uses: actions/setup-java@v3
        with:
          distribution: 'temurin'
          java-version: '17'
      - uses: android-actions/setup-android@v2
      - run: chmod +x android/gradlew
      - run: cd android && ./gradlew assembleDebug
      - uses: actions/upload-artifact@v4
        with:
          name: angels-garden-debug
          path: android/app/build/outputs/apk/debug/app-debug.apk
