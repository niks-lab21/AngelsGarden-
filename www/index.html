<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>The Angel's Garden</title>
    <link rel="stylesheet" href="style.css">
    <style>
        /* ═══════════════════════════════════════
           LUXURY RADIO PLAYER — Cozy Sanctuary
        ═══════════════════════════════════════ */

        :root {
            --espresso:   #1A110B;
            --charcoal:   #221610;
            --obsidian:   #2C1E14;
            --cream:      #E2CEAD;
            --cream-dim:  #9A8A72;
            --amber:      #C8823A;
            --amber-glow: rgba(200, 130, 58, 0.28);
            --honey:      #D4892F;
            --gold-muted: #B87A30;
            --border:     rgba(200, 130, 58, 0.18);
        }

        #player-shell {
            background: var(--espresso);
            border-radius: 20px;
            border: 1px solid var(--border);
            overflow: hidden;
            box-shadow:
                0 4px 24px rgba(0,0,0,0.6),
                0 0 0 0.5px rgba(200,130,58,0.1) inset;
            animation: amberPulse 4s ease-in-out infinite;
            margin-top: 8px;
        }

        @keyframes amberPulse {
            0%, 100% { box-shadow: 0 4px 24px rgba(0,0,0,0.6), 0 0 12px var(--amber-glow); }
            50%       { box-shadow: 0 4px 32px rgba(0,0,0,0.7), 0 0 28px var(--amber-glow); }
        }

        /* ── Header Row ── */
        #player-header {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 11px 14px;
            cursor: pointer;
            user-select: none;
            background: linear-gradient(135deg, var(--charcoal), var(--obsidian));
            border-bottom: 1px solid var(--border);
            transition: background 0.2s;
        }
        #player-header:active { background: var(--obsidian); }

        /* Audio bars */
        .audio-bars {
            display: flex;
            align-items: flex-end;
            gap: 2px;
            height: 18px;
            flex-shrink: 0;
        }
        .audio-bars span {
            display: block;
            width: 3px;
            border-radius: 2px;
            background: var(--amber);
            animation-duration: 1.1s;
            animation-iteration-count: infinite;
            animation-timing-function: ease-in-out;
        }
        .audio-bars span:nth-child(1) { height: 6px;  animation-name: bar1; }
        .audio-bars span:nth-child(2) { height: 14px; animation-name: bar2; animation-delay: 0.2s; }
        .audio-bars span:nth-child(3) { height: 9px;  animation-name: bar3; animation-delay: 0.4s; }
        .audio-bars span:nth-child(4) { height: 5px;  animation-name: bar4; animation-delay: 0.15s; }

        @keyframes bar1 { 0%,100%{height:5px}  50%{height:16px} }
        @keyframes bar2 { 0%,100%{height:14px} 50%{height:5px}  }
        @keyframes bar3 { 0%,100%{height:8px}  50%{height:18px} }
        @keyframes bar4 { 0%,100%{height:12px} 50%{height:5px}  }

        #now-playing {
            flex: 1;
            font-size: 12px;
            color: var(--cream);
            letter-spacing: 0.04em;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        #now-playing span { color: var(--cream-dim); font-size: 10px; }

        .expand-arrow {
            color: var(--amber);
            font-size: 14px;
            transition: transform 0.3s ease;
            flex-shrink: 0;
        }
        .expand-arrow.open { transform: rotate(180deg); }

        /* ── Category Tabs ── */
        #spotify-tabs {
            display: flex;
            gap: 0;
            background: var(--charcoal);
            border-bottom: 1px solid var(--border);
            overflow-x: auto;
            scrollbar-width: none;
        }
        #spotify-tabs::-webkit-scrollbar { display: none; }

        #spotify-tabs .tab {
            flex: 1;
            min-width: 56px;
            padding: 7px 4px;
            border: none;
            background: transparent;
            color: var(--cream-dim);
            font-size: 11px;
            letter-spacing: 0.03em;
            cursor: pointer;
            transition: all 0.2s;
            border-bottom: 2px solid transparent;
        }
        #spotify-tabs .tab.active {
            color: var(--cream);
            border-bottom: 2px solid var(--amber);
            background: rgba(200,130,58,0.06);
        }

        /* ── Playlist Chips ── */
        #spotify-chips {
            display: flex;
            gap: 6px;
            padding: 8px 12px;
            overflow-x: auto;
            background: var(--espresso);
            scrollbar-width: none;
        }
        #spotify-chips::-webkit-scrollbar { display: none; }

        #spotify-chips .chip {
            flex-shrink: 0;
            padding: 4px 11px;
            border: 1px solid var(--border);
            border-radius: 14px;
            background: transparent;
            color: var(--cream-dim);
            font-size: 11px;
            cursor: pointer;
            transition: all 0.2s;
        }
        #spotify-chips .chip.active {
            background: var(--honey);
            border-color: var(--honey);
            color: var(--espresso);
            font-weight: 600;
            box-shadow: 0 0 10px rgba(212, 137, 47, 0.4);
        }
        #spotify-chips .chip.empty {
            opacity: 0.45;
            cursor: default;
            border-style: dashed;
        }

        /* ── Iframe Wrapper ── */
        #iframe-wrapper {
            max-height: 0;
            overflow: hidden;
            transition: max-height 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            background: var(--espresso);
        }
        #iframe-wrapper iframe {
            display: block;
            width: 100%;
            border-radius: 0 0 18px 18px;
            opacity: 0.93;
            transition: height 0.3s ease;
        }

        /* ── Landscape — compact layout ── */
        @media (orientation: landscape) {
            #player-header  { padding: 7px 12px; }
            #spotify-tabs .tab { padding: 5px 4px; font-size: 10px; }
            #spotify-chips  { padding: 6px 10px; }
            #spotify-chips .chip { padding: 3px 10px; font-size: 10px; }
        }

        /* ── Portrait ── */
        @media (orientation: portrait) {
            #player-header  { padding: 13px 16px; }
            #spotify-tabs .tab { padding: 9px 6px; font-size: 12px; }
            #spotify-chips  { padding: 10px 14px; }
            #spotify-chips .chip { padding: 6px 13px; font-size: 12px; }
        }

        /* ── TAP TO START HINT (BATTERY SAVER FIX) ── */
        #tap-hint {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: #ffd700;
            font-family: 'Crimson Pro', serif;
            font-size: 16px;
            letter-spacing: 2px;
            z-index: 10005; /* This ensures it's above everything, even the black play button */
            background: rgba(0, 0, 0, 0.6);
            padding: 12px 24px;
            border-radius: 30px;
            border: 1px solid rgba(255, 215, 0, 0.4);
            pointer-events: none;
            animation: pulseGlow 2s infinite;
            text-align: center;
        }

        @keyframes pulseGlow {
            0%, 100% { opacity: 0.6; transform: translate(-50%, -50%) scale(1); box-shadow: 0 0 10px rgba(255, 215, 0, 0.2); }
            50% { opacity: 1; transform: translate(-50%, -50%) scale(1.05); box-shadow: 0 0 20px rgba(255, 215, 0, 0.6); }
        }
    </style>
</head>
<body>

    <div id="splash-overlay" onclick="startExperience()" style="position:fixed; inset:0; z-index:9999; cursor:pointer;">
        
        <div id="tap-hint">[ Tap to Open Your Gift 🎁 ]</div>

        <video id="intro-video" src="assets/videos/splash.mp4" muted playsinline poster="assets/images/lotus_fallback.png" style="position:absolute; inset:0; width:100%; height:100%; object-fit:cover; z-index:1;"></video>
        
        <div id="splash-fallback" style="position:absolute; inset:0; background:#000; z-index:0;"></div>
        
        <div id="splash-note" class="hidden" style="position:absolute; z-index:2;">
            <p>
                "A safe sanctuary for you, My Sweetheart ❤️🎀<br><br>
                Let your soul rest here whenever life gets too loud.<br>
                Just lean on me, let go, and lose yourself in this universe.<br><br>
                You're home now. You're safe here. ✨"
            </p>
            <span>(Tap to enter)</span>
        </div>
    </div>

    <video muted loop id="main-video-bg" style="position:fixed; inset:0; width:100%; height:100%; object-fit:cover; z-index:0; pointer-events:none;">
        <source src="assets/videos/main_sanctuary.mp4" type="video/mp4">
    </video>

    <div id="media-dock" class="hidden-dock" style="position:relative; z-index:100;">
        <div class="swipe-handle"></div>
        <div class="controls">
            <div id="track-info">The Angel's Garden Radio</div>
            <button onclick="toggleAudio()">Play/Pause</button>

            <div id="player-shell">

                <div id="player-header" onclick="toggleExpand()">
                    <div class="audio-bars">
                        <span></span><span></span><span></span><span></span>
                    </div>
                    <div id="now-playing">Loading…</div>
                    <div class="expand-arrow" id="expand-arrow">▾</div>
                </div>

                <div id="spotify-tabs">
                    <button class="tab active" onclick="switchTab('vibe')">✨ Vibe</button>
                    <button class="tab" onclick="switchTab('nature')">🌿 Nature</button>
                    <button class="tab" onclick="switchTab('peace')">☁️ Peace</button>
                    <button class="tab" onclick="switchTab('sleep')">🌙 Sleep</button>
                    <button class="tab" onclick="switchTab('youtube')">📺 YouTube</button>
                </div>

                <div id="spotify-chips"></div>

                <div id="iframe-wrapper">
                    <iframe
                        id="spotify-iframe"
                        src=""
                        height="80"
                        frameBorder="0"
                        allowfullscreen=""
                        allow="autoplay; clipboard-write; encrypted-media; fullscreen; picture-in-picture; web-share"
                        loading="lazy"
                        referrerpolicy="strict-origin-when-cross-origin">
                    </iframe>
                </div>

            </div>
            </div>
    </div>

    <canvas id="doodle-canvas" style="position:fixed; inset:0; z-index:10; pointer-events:auto; touch-action:none;"></canvas>

    <div id="interaction-layer" style="position:fixed; inset:0; z-index:20; pointer-events:none;">
        <div id="cat-trigger" onclick="playHapticPurr()" style="position:absolute; width:90px; height:90px; bottom:180px; left:20px; border-radius:50%; pointer-events:auto; cursor:pointer;"></div>
        <div id="envelope-trigger" onclick="openHiddenNote()" style="position:absolute; width:60px; height:60px; top:20px; right:20px; border-radius:12px; pointer-events:auto; cursor:pointer;">
            <img src="assets/images/envelope.png" id="envelope-img" alt="Secret Note" style="width:100%; height:100%;">
        </div>
    </div>

    <script src="script.js"></script>
    <script>
        // ─────────────────────────────────────────
        //  BATTERY SAVER BYPASS LOGIC
        // ─────────────────────────────────────────
        function startExperience() {
            const video = document.getElementById('intro-video');
            const hint = document.getElementById('tap-hint');
            const overlay = document.getElementById('splash-overlay');
            
            // 1. Unmute and force play the video
            video.muted = false;
            video.play().catch(e => console.log("Video Error (Battery Saver):", e));
            
            // 2. Hide the glowing text
            if(hint) hint.style.display = 'none';
            
            // 3. Remove the click listener so it doesn't fire again
            overlay.onclick = null;
            
            // 4. Play the splash audio if it exists in script.js
            if(typeof splashAudio !== 'undefined') {
                splashAudio.play().catch(e => console.log("Audio Error:", e));
            }
        }

        // ─────────────────────────────────────────
        //  PLAYLIST CONFIG — All your videos
        // ─────────────────────────────────────────
        const PLAYLISTS = {
            vibe: [
                { label: "<3",       id: "4BfoTqY9raoUES0uUijrxr", type: "playlist" },
                { label: "Angrezii", id: "1rkrR0VIW4Iw9IUDRUwuJt", type: "playlist" },
                { label: "Indie",    id: "5o69MAfV9BkOI35l5wjpGn", type: "playlist" },
                { label: "Dance",    id: "3QhyaUGJtmnV7XNlYIsiJm", type: "playlist" },
                { label: "Gazals",   id: "3xIsMYKCv3WgdLtGbseASz", type: "playlist" },
                { label: "Retro",    id: "1Phz1s9ZjaJe0b6mfEisSi", type: "playlist" },
                { label: "Album",    id: "0LZ0J0uxtSPbBbW05n42gZ", type: "album"    },
            ],
            nature: [
                { label: "Forest",       id: "37i9dQZF1DX4PP3DA4J0N8", type: "playlist" },
                { label: "Rain",         id: "1vm8GNDZzYEkVQcoArNySo", type: "playlist" },
                { label: "Thunder",      id: "0nFIMpdeDoWR5IxXazXBiw", type: "album"    },
                { label: "Nature Noice", id: "37i9dQZF1DWUKPeBypcpcP", type: "playlist" },
                { label: "Calm",         id: "",                        type: "playlist" },
            ],
            peace: [
                { label: "Peace", id: "5MoyOu6s9tJoy1XZ2SGc1k", type: "playlist" },
                { label: "Shiva", id: "3CEFGOFlG7S7PJyJHErSyu", type: "playlist" },
            ],
            sleep: [
                { label: "Cuddles", id: "6Ad8DpdjkMMpw1nE0xr7KK", type: "playlist" },
                { label: "Sleep 1", id: "", type: "playlist" },
                { label: "Sleep 2", id: "", type: "playlist" },
            ],
            youtube: [
                { label: "Nature 1",    id: "hMxlDbv-rec", type: "youtube" },
                { label: "Nature 2",    id: "c2NmyoXBXmE", type: "youtube" },
                { label: "Calm",        id: "xRcWlA1I9z0", type: "youtube" },
                { label: "Bowling",     id: "lBJWVtN8nTc", type: "youtube" },
                { label: "Slice 1",     id: "OxqooRcaw8w", type: "youtube" },
                { label: "Slice 2",     id: "MWPYhebILb4", type: "youtube" },
                { label: "Slice 3",     id: "QWSX4vbGouI", type: "youtube" },
                { label: "Slice 4",     id: "Dkj3VZfmwk0", type: "youtube" },
            ],
        };

        // Orientation-aware heights
        function getIframeH(type) {
            const portrait = window.innerWidth < window.innerHeight;
            if (type === 'youtube') return portrait ? '200' : '150';
            return '80';
        }
        function getWrapperH(type) {
            const portrait = window.innerWidth < window.innerHeight;
            if (type === 'youtube') return portrait ? '220px' : '170px';
            return '100px';
        }

        let currentTab  = "vibe";
        let currentChip = 0;
        let isExpanded  = false;

        // Toggle iframe expand
        function toggleExpand() {
            isExpanded = !isExpanded;
            const wrapper = document.getElementById('iframe-wrapper');
            const p = PLAYLISTS[currentTab][currentChip];
            wrapper.style.maxHeight = isExpanded ? getWrapperH(p?.type) : '0px';
            document.getElementById('expand-arrow').classList.toggle('open', isExpanded);
        }

        // Switch category tab
        function switchTab(tab) {
            currentTab  = tab;
            currentChip = 0;
            const map = { vibe:'Vibe', nature:'Nature', peace:'Peace', sleep:'Sleep', youtube:'YouTube' };
            document.querySelectorAll('#spotify-tabs .tab').forEach(btn => {
                btn.classList.toggle('active', btn.textContent.includes(map[tab]));
            });
            renderChips();
            loadPlaylist(0);
        }

        // Render playlist chips
        function renderChips() {
            const container = document.getElementById('spotify-chips');
            container.innerHTML = '';
            PLAYLISTS[currentTab].forEach((p, i) => {
                const isEmpty = !p.id;
                const btn = document.createElement('button');
                btn.className = 'chip' + (i === currentChip ? ' active' : '') + (isEmpty ? ' empty' : '');
                btn.textContent = isEmpty ? `${p.label} ·` : p.label;
                btn.onclick = () => {
                    if (isEmpty) return;
                    currentChip = i;
                    document.querySelectorAll('#spotify-chips .chip')
                        .forEach((c, ci) => c.classList.toggle('active', ci === i));
                    loadPlaylist(i);
                    if (!isExpanded) toggleExpand();
                };
                container.appendChild(btn);
            });
        }

        // Load playlist into iframe
        function loadPlaylist(index) {
            const p       = PLAYLISTS[currentTab][index];
            const iframe  = document.getElementById('spotify-iframe');
            const wrapper = document.getElementById('iframe-wrapper');

            // Empty ID guard
            if (!p.id) {
                document.getElementById('now-playing').innerHTML =
                    `${p.label} &nbsp;<span>Coming soon…</span>`;
                return;
            }

            // YouTube vs Spotify (Fixed Spotify URL structure!)
            if (p.type === 'youtube') {
                iframe.src    = `https://www.youtube-nocookie.com/embed/${p.id}?rel=0&modestbranding=1`;
                iframe.height = getIframeH('youtube');
                if (isExpanded) wrapper.style.maxHeight = getWrapperH('youtube');
            } else {
                iframe.src    = `https://open.spotify.com/embed/${p.type}/${p.id}?utm_source=generator&theme=0`;
                iframe.height = getIframeH(p.type);
                if (isExpanded) wrapper.style.maxHeight = getWrapperH(p.type);
            }

            const catLabel = {
                vibe: '✨ Vibe', nature: '🌿 Nature',
                peace: '☁️ Peace', sleep: '🌙 Sleep', youtube: '📺 YouTube'
            };
            document.getElementById('now-playing').innerHTML =
                `${p.label} &nbsp;<span>${catLabel[currentTab]}</span>`;
        }

        // Init
        renderChips();
        loadPlaylist(0);
    </script>
</body>
</html>
