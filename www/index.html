<!DOCTYPE html>
<html lang="hi">
<head>
    <link rel="manifest" href="manifest.json">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>The Angel's Garden</title>
    <link rel="stylesheet" href="style.css">
    <style>
        /* ═══════════════════════════════════════
           LUXURY RADIO PLAYER — Cozy Sanctuary
        ═══════════════════════════════════════ */
        :root {
            --espresso:   #1A110B;
            --charcoal:   #221610;
            --obsidian:   #2C1E14;
            --cream:      #E2CEAD;
            --cream-dim:  #9A8A72;
            --amber:      #C8823A;
            --amber-glow: rgba(200, 130, 58, 0.28);
            --honey:      #D4892F;
            --gold-muted: #B87A30;
            --border:     rgba(200, 130, 58, 0.18);
        }

        #player-shell {
            background: var(--espresso);
            border-radius: 20px;
            border: 1px solid var(--border);
            overflow: hidden;
            box-shadow: 0 4px 24px rgba(0,0,0,0.6), 0 0 0 0.5px rgba(200,130,58,0.1) inset;
            animation: amberPulse 4s ease-in-out infinite;
            margin-top: 8px;
        }

        @keyframes amberPulse {
            0%, 100% { box-shadow: 0 4px 24px rgba(0,0,0,0.6), 0 0 12px var(--amber-glow); }
            50%       { box-shadow: 0 4px 32px rgba(0,0,0,0.7), 0 0 28px var(--amber-glow); }
        }

        /* ── Audio Bars ── */
        .audio-bars { display: flex; align-items: flex-end; gap: 2px; height: 18px; flex-shrink: 0; }
        .audio-bars span { display: block; width: 3px; border-radius: 2px; background: var(--amber); animation-duration: 1.1s; animation-iteration-count: infinite; }
        .audio-bars span:nth-child(1) { height: 6px;  animation-name: bar1; }
        .audio-bars span:nth-child(2) { height: 14px; animation-name: bar2; animation-delay: 0.2s; }
        .audio-bars span:nth-child(3) { height: 9px;  animation-name: bar3; animation-delay: 0.4s; }
        .audio-bars span:nth-child(4) { height: 5px;  animation-name: bar4; animation-delay: 0.15s; }

        @keyframes bar1 { 0%,100%{height:5px}  50%{height:16px} }
        @keyframes bar2 { 0%,100%{height:14px} 50%{height:5px}  }
        @keyframes bar3 { 0%,100%{height:8px}  50%{height:18px} }
        @keyframes bar4 { 0%,100%{height:12px} 50%{height:5px}  }

        #player-header { display: flex; align-items: center; gap: 10px; padding: 11px 14px; cursor: pointer; background: linear-gradient(135deg, var(--charcoal), var(--obsidian)); border-bottom: 1px solid var(--border); }
        #now-playing { flex: 1; font-size: 12px; color: var(--cream); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .expand-arrow { color: var(--amber); font-size: 14px; transition: transform 0.3s ease; }
        .expand-arrow.open { transform: rotate(180deg); }

        #spotify-tabs { display: flex; background: var(--charcoal); border-bottom: 1px solid var(--border); overflow-x: auto; scrollbar-width: none; }
        #spotify-tabs .tab { flex: 1; min-width: 56px; padding: 7px 4px; border: none; background: transparent; color: var(--cream-dim); font-size: 11px; cursor: pointer; border-bottom: 2px solid transparent; }
        #spotify-tabs .tab.active { color: var(--cream); border-bottom: 2px solid var(--amber); background: rgba(200,130,58,0.06); }

        #spotify-chips { display: flex; gap: 6px; padding: 8px 12px; overflow-x: auto; background: var(--espresso); scrollbar-width: none; }
        #spotify-chips .chip { flex-shrink: 0; padding: 4px 11px; border: 1px solid var(--border); border-radius: 14px; color: var(--cream-dim); font-size: 11px; cursor: pointer; }
        #spotify-chips .chip.active { background: var(--honey); color: var(--espresso); font-weight: 600; box-shadow: 0 0 10px rgba(212, 137, 47, 0.4); }

        #iframe-wrapper { max-height: 0; overflow: hidden; transition: max-height 0.4s cubic-bezier(0.4, 0, 0.2, 1); background: var(--espresso); }
        #iframe-wrapper iframe { display: block; width: 100%; border-radius: 0 0 18px 18px; opacity: 0.93; }

        /* Mobile specific spacing */
        @media (orientation: portrait) {
            #player-header { padding: 13px 16px; }
            #spotify-tabs .tab { padding: 9px 6px; font-size: 12px; }
        }
    </style>
</head>
<body>

    <div id="splash-overlay">
        <video id="intro-video" src="assets/videos/splash.mp4" playsinline autoplay muted></video>
        <div id="splash-note" class="hidden">
            <p>
                "A safe sanctuary for you, My Sweetheart ❤️🎀<br><br>
                Let your soul rest here whenever life gets too loud.<br>
                Just lean on me, let go, and lose yourself in this universe.<br><br>
                You're home now. You're safe here. ✨"
            </p>
            <span>(Tap to enter)</span>
        </div>
    </div>

    <video autoplay muted loop id="main-video-bg">
        <source src="assets/videos/main_sanctuary.mp4" type="video/mp4">
    </video>

    <div id="media-dock" class="hidden-dock">
        <div class="swipe-handle"></div>
        <div class="controls">
            <div id="track-info">The Angel's Garden Radio</div>
            
            <div id="player-shell">
                <div id="player-header" onclick="toggleExpand()">
                    <div class="audio-bars"><span></span><span></span><span></span><span></span></div>
                    <div id="now-playing">Loading…</div>
                    <div class="expand-arrow" id="expand-arrow">▾</div>
                </div>

                <div id="spotify-tabs">
                    <button class="tab active" onclick="switchTab('vibe')">✨ Vibe</button>
                    <button class="tab" onclick="switchTab('nature')">🌿 Nature</button>
                    <button class="tab" onclick="switchTab('peace')">☁️ Peace</button>
                    <button class="tab" onclick="switchTab('sleep')">🌙 Sleep</button>
                    <button class="tab" onclick="switchTab('youtube')">📺 YouTube</button>
                </div>

                <div id="spotify-chips"></div>

                <div id="iframe-wrapper">
                    <iframe id="spotify-iframe" src="" height="80" frameBorder="0" allowfullscreen="" allow="autoplay; clipboard-write; encrypted-media; fullscreen; picture-in-picture"></iframe>
                </div>
            </div>
        </div>
    </div>

    <canvas id="doodle-canvas"></canvas>
    
    <div id="artist-platter">
        <div id="brush-options">
            <button onclick="setBrush('ink-bleed')">💧</button>
            <button onclick="setBrush('perfect-circle')">⭕</button>
            <button onclick="setBrush('soft-glow')">✨</button>
        </div>
        <input type="range" class="brush-slider" min="1" max="50" value="5" oninput="updateBrushSize(this.value)">
        <input type="color" id="color-picker" onchange="updateColor(this.value)" value="#ffffff">
    </div>

    <div id="interaction-layer">
        <div id="cat-trigger" onclick="playHapticPurr()"></div>
        <div id="envelope-trigger" onclick="openHiddenNote()">
            <img src="assets/images/envelope.png" id="envelope-img" alt="Secret Note">
        </div>
    </div>

    <script src="script.js"></script>
    <script>
        const PLAYLISTS = {
            vibe: [
                { label: "<3", id: "4BfoTqY9raoUES0uUijrxr", type: "playlist" },
                { label: "Indie", id: "5o69MAfV9BkOI35l5wjpGn", type: "playlist" },
                { label: "Gazals", id: "3xIsMYKCv3WgdLtGbseASz", type: "playlist" }
            ],
            nature: [
                { label: "Rain", id: "1vm8GNDZzYEkVQcoArNySo", type: "playlist" },
                { label: "Forest", id: "37i9dQZF1DX4PP3DA4J0N8", type: "playlist" }
            ],
            peace: [
                { label: "Peace", id: "5MoyOu6s9tJoy1XZ2SGc1k", type: "playlist" }
            ],
            sleep: [
                { label: "Cuddles", id: "6Ad8DpdjkMMpw1nE0xr7KK", type: "playlist" }
            ],
            youtube: [
                { label: "Slice of Life", id: "PLdY5DIkkwk41EFlKFiaJnTcuJxDE8MyTA", type: "youtube" },
                { label: "Calm", id: "PLdY5DIkkwk40AsbA2BADPEi2esPM8z-bz", type: "youtube" }
            ]
        };

        function getIframeH(type) { return type === 'youtube' ? (window.innerWidth < window.innerHeight ? '200' : '150') : '80'; }
        function getWrapperH(type) { return type === 'youtube' ? (window.innerWidth < window.innerHeight ? '220px' : '170px') : '100px'; }

        let currentTab = "vibe", currentChip = 0, isExpanded = false;

        function toggleExpand() {
            isExpanded = !isExpanded;
            const wrapper = document.getElementById('iframe-wrapper');
            const p = PLAYLISTS[currentTab][currentChip];
            wrapper.style.maxHeight = isExpanded ? getWrapperH(p?.type) : '0px';
            document.getElementById('expand-arrow').classList.toggle('open', isExpanded);
        }

        function switchTab(tab) {
            currentTab = tab; currentChip = 0;
            document.querySelectorAll('#spotify-tabs .tab').forEach(btn => {
                const map = { vibe:'Vibe', nature:'Nature', peace:'Peace', sleep:'Sleep', youtube:'YouTube' };
                btn.classList.toggle('active', btn.textContent.includes(map[tab]));
            });
            renderChips(); loadPlaylist(0);
        }

        function renderChips() {
            const container = document.getElementById('spotify-chips');
            container.innerHTML = '';
            PLAYLISTS[currentTab].forEach((p, i) => {
                const btn = document.createElement('button');
                btn.className = 'chip' + (i === currentChip ? ' active' : '');
                btn.textContent = p.label;
                btn.onclick = () => { currentChip = i; loadPlaylist(i); if (!isExpanded) toggleExpand(); };
                container.appendChild(btn);
            });
        }

        function loadPlaylist(index) {
            const p = PLAYLISTS[currentTab][index];
            const iframe = document.getElementById('spotify-iframe');
            if (p.type === 'youtube') {
                iframe.src = `https://www.youtube.com/embed/videoseries?list=${p.id}&autoplay=1`;
            } else {
    iframe.src = "https://open.spotify.com/embed/" + p.type + "/" + p.id + "?utm_source=generator&theme=0";
            }
        
            document.getElementById('now-playing').innerHTML = `${p.label} <span>${currentTab.toUpperCase()}</span>`;
            renderChips();
        }

        renderChips(); loadPlaylist(0);
    </script>
</body>
</html>
